name: caddymoney
description: "CaddyMoney is a secure, multi-role fintech platform built with Flutter and Supabase, empowering users to send and receive money, merchants to manage payments, and administrators to oversee all platform operations with robust financial controls."
publish_to: "none"
version: 1.0.0

environment:
  sdk: ^3.6.0

dependencies:
  file_picker: '>=8.1.2'
  image_picker: '>=1.1.2'
  http: ^1.0.0
  file_selector: ^1.0.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.2
  go_router: ^16.2.0
  supabase_flutter: '>=1.10.0'
  intl: 0.20.2
  shared_preferences: ^2.0.0
  flutter_svg: ^2.0.0
  qr_flutter: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/dreamflow_icon.jpg
  remove_alpha_ios: true
